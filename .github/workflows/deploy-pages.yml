name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        run: |
          mkdir -p dist
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'backups/' \
            --exclude '.DS_Store' \
            ./ dist/
          touch dist/.nojekyll

      - name: Inject runtime config
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          API_BASE_URL: ${{ vars.API_BASE_URL || secrets.API_BASE_URL }}
        run: |
          escape_for_sed() {
            printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          normalize_google_client_id() {
            printf '%s' "$1" | sed -E "s/^[[:space:]'\"]+//; s/[[:space:]'\"]+$//"
          }

          is_valid_google_client_id() {
            printf '%s' "$1" | grep -Eq '^[0-9]+-[a-z0-9-]+\.apps\.googleusercontent\.com$'
          }

          GOOGLE_CLIENT_ID_NORMALIZED="$(normalize_google_client_id "${GOOGLE_CLIENT_ID}")"
          if [ -n "${GOOGLE_CLIENT_ID_NORMALIZED}" ] && is_valid_google_client_id "${GOOGLE_CLIENT_ID_NORMALIZED}"; then
            GOOGLE_CLIENT_ID_ESCAPED="$(escape_for_sed "${GOOGLE_CLIENT_ID_NORMALIZED}")"
            sed -i "s|<meta name=\"google-client-id\" content=\"[^\"]*\" />|<meta name=\"google-client-id\" content=\"${GOOGLE_CLIENT_ID_ESCAPED}\" />|" dist/index.html
          elif [ -n "${GOOGLE_CLIENT_ID}" ]; then
            echo "::warning::GOOGLE_CLIENT_ID non valido. Mantengo il valore presente in index.html"
          fi

          if [ -n "${API_BASE_URL}" ]; then
            API_BASE_URL_ESCAPED="$(escape_for_sed "${API_BASE_URL}")"
            sed -i "s|<meta name=\"api-base-url\" content=\"[^\"]*\" />|<meta name=\"api-base-url\" content=\"${API_BASE_URL_ESCAPED}\" />|" dist/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

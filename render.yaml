services:
  - type: web
    name: agoad-backend
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: ""
    startCommand: node server/index.mjs
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_OWNER
        value: Ordwa
      - key: GITHUB_REPO
        value: AGOAD
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://ordwa.github.io,http://localhost:8080,http://127.0.0.1:8080
      - key: COOKIE_SAMESITE
        value: None
      - key: COOKIE_SECURE
        value: "1"
